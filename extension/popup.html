<!DOCTYPE html>
<html>
<head>
    <style>
        body {
            width: 300px;
            padding: 16px;
            font-family: sans-serif;
            background: #0f172a;
            color: white;
        }
        .header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 16px;
        }
        .status {
            padding: 8px;
            border-radius: 8px;
            background: rgba(99, 102, 241, 0.1);
            font-size: 14px;
            border: 1px solid rgba(99, 102, 241, 0.2);
        }
        .btn {
            display: block;
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            background: #6366f1;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="header">
        <h2 style="margin:0; font-size: 18px;">GuardMedia</h2>
    </div>
    <div class="status">
        Scanner: <span style="color: #22c55e;">Active</span>
    </div>
    <p style="font-size: 12px; color: #94a3b8;">Scanning images on this page for unauthorized content using AI fingerprints.</p>
    <button class="btn">View Dashboard</button>
</body>
</html>
