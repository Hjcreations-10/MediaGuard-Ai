<!DOCTYPE html>
<html>
<head>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        
        body {
            width: 340px;
            margin: 0;
            padding: 24px;
            font-family: 'Inter', sans-serif;
            background: #020617;
            color: white;
            overflow: hidden;
        }

        .glass-container {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            padding: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }

        .header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 24px;
        }

        .logo-icon {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, #6366f1, #0ea5e9);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 15px rgba(99, 102, 241, 0.4);
        }

        .alert-banner {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            border-radius: 12px;
            padding: 12px;
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
            color: #ef4444;
            font-size: 14px;
            font-weight: 700;
        }

        .content-area {
            display: flex;
            gap: 20px;
            margin-bottom: 24px;
        }

        .preview-box {
            width: 120px;
            height: 120px;
            border-radius: 16px;
            overflow: hidden;
            background: #1e293b;
            position: relative;
        }

        .preview-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: blur(4px);
            opacity: 0.7;
        }

        .preview-label {
            position: absolute;
            bottom: 8px;
            left: 8px;
            font-size: 10px;
            color: rgba(255,255,255,0.5);
            font-family: monospace;
        }

        .score-box {
            flex: 1;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .gauge-container {
            width: 80px;
            height: 80px;
            position: relative;
            margin-bottom: 8px;
        }

        .gauge-svg {
            transform: rotate(-90deg);
        }

        .gauge-bg {
            fill: none;
            stroke: rgba(255,255,255,0.05);
            stroke-width: 8;
        }

        .gauge-fill {
            fill: none;
            stroke: #ef4444;
            stroke-width: 8;
            stroke-dasharray: 251.2;
            stroke-dashoffset: 221; /* 12% of 251.2 */
            stroke-linecap: round;
            transition: stroke-dashoffset 1s ease-out;
        }

        .score-val {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: 800;
        }

        .btn-report {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #ef4444, #6366f1);
            border: none;
            border-radius: 14px;
            color: white;
            font-weight: 700;
            font-size: 15px;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(239, 68, 68, 0.3);
            transition: all 0.3s ease;
        }

        .btn-report:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(239, 68, 68, 0.5);
        }
    </style>
</head>
<body>
    <div class="glass-container">
        <div class="header">
            <div class="logo-icon">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="white"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm0 6c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 12.27c-2.53-1.02-4.53-3.02-5.55-5.55.7-.35 1.5-.55 2.33-.55h6.44c.83 0 1.63.2 2.33.55-1.02 2.53-3.02 4.53-5.55 5.55z"/></svg>
            </div>
            <h2 style="margin:0; font-size: 20px; font-weight: 800; letter-spacing: -0.5px;">Media<span style="color:#6366f1">Guard</span> AI</h2>
        </div>

        <div class="alert-banner">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
            Suspicious Media Detected
        </div>

        <div class="content-area">
            <div class="preview-box">
                <img src="https://images.unsplash.com/photo-1506744038136-46273834b3fb?w=200&auto=format&fit=crop" class="preview-img">
                <div class="preview-label">image_scan_001.jpg<br/>140x95px</div>
            </div>
            <div class="score-box">
                <div style="font-size: 11px; font-weight: 700; color: #94a3b8; text-transform: uppercase; margin-bottom: 8px;">Trust Score</div>
                <div class="gauge-container">
                    <svg class="gauge-svg" width="80" height="80">
                        <circle class="gauge-bg" cx="40" cy="40" r="32" />
                        <circle class="gauge-fill" cx="40" cy="40" r="32" />
                    </svg>
                    <div class="score-val">12%</div>
                </div>
                <div style="font-size: 10px; color: #ef4444; font-weight: 700;">Score: 12% (Critical)</div>
            </div>
        </div>

        <button class="btn-report">View Detailed Report</button>
    </div>
</body>
</html>
